name: Build, Push, and Update Kubernetes Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dockerhub-gitops:
    name: Build images and update manifests
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tags to Docker Hub
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/employee-backend:${{ env.IMAGE_TAG }}
            ${{ vars.DOCKERHUB_USERNAME }}/employee-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/employee-frontend:${{ env.IMAGE_TAG }}
            ${{ vars.DOCKERHUB_USERNAME }}/employee-frontend:latest

      - name: Update Kubernetes deployment images
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|image: .*employee-backend:.*|image: ${DOCKERHUB_USERNAME}/employee-backend:${IMAGE_TAG}|g" k8s-kind/backend-deployment.yaml
          sed -i "s|image: .*employee-frontend:.*|image: ${DOCKERHUB_USERNAME}/employee-frontend:${IMAGE_TAG}|g" k8s-kind/frontend-deployment.yaml
          sed -i "s|image: .*employee-backend:.*|image: ${DOCKERHUB_USERNAME}/employee-backend:${IMAGE_TAG}|g" k8s-eks/backend-deployment.yaml
          sed -i "s|image: .*employee-frontend:.*|image: ${DOCKERHUB_USERNAME}/employee-frontend:${IMAGE_TAG}|g" k8s-eks/frontend-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-kind/backend-deployment.yaml k8s-kind/frontend-deployment.yaml k8s-eks/backend-deployment.yaml k8s-eks/frontend-deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "Update Kubernetes image tags to ${IMAGE_TAG} [skip ci]"
          git push

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-hub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/employee-crud.git
    targetRevision: main
    path: k8s-kind
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: employee-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
